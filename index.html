<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍹 電力特調 - 小小實驗室</title>
    <style>
      body { 
        font-family: 'Microsoft JhengHei', sans-serif; 
        background-color: #F0F4F8; 
        text-align: center; 
        padding: 15px; 
        color: #333; 
        margin: 0;
      }
      .container { 
        background: white; 
        border-radius: 25px; 
        padding: 25px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        max-width: 420px; 
        margin: 20px auto; 
        border: 2px solid #E0E0E0; 
      }
      h1 { 
        color: #FF7043; 
        font-size: 28px; 
        margin-bottom: 15px; 
        letter-spacing: 2px;
      }
      .guide-card { 
        background: #FFF9C4; 
        border-radius: 15px; 
        padding: 15px; 
        text-align: left; 
        margin-bottom: 25px; 
        border-left: 5px solid #FBC02D; 
      }
      .guide-card h3 { 
        margin: 0 0 8px 0; 
        color: #F57F17; 
        font-size: 16px; 
      }
      .guide-card p { 
        margin: 6px 0; 
        font-size: 14px; 
        line-height: 1.5; 
        font-weight: bold;
      }
      .select-box { 
        margin-bottom: 20px; 
        text-align: left; 
      }
      .select-box label { 
        font-weight: bold; 
        color: #546E7A; 
        display: block; 
        margin-bottom: 10px; 
        font-size: 15px;
      }
      select { 
        width: 100%; 
        padding: 12px; 
        border-radius: 15px; 
        border: 2px solid #CFD8DC; 
        font-size: 16px; 
        background: #FAFAFA;
        cursor: pointer;
        outline: none;
      }
      .btn-mix { 
        background: #FF7043; 
        color: white; 
        border: none; 
        width: 100%; 
        padding: 16px; 
        font-size: 20px; 
        border-radius: 20px; 
        cursor: pointer; 
        font-weight: bold; 
        transition: 0.3s; 
        box-shadow: 0 4px 0 #D84315;
      }
      .btn-mix:hover { 
        background: #F4511E; 
        transform: translateY(2px); 
        box-shadow: 0 2px 0 #D84315;
      }
      #result-display { 
        margin-top: 25px; 
        padding: 20px; 
        border-radius: 20px; 
        display: none; 
        animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
      }
      @keyframes popIn { 
        from { transform: scale(0.8); opacity: 0; } 
        to { transform: scale(1); opacity: 1; } 
      }
      .emoji-icon { 
        font-size: 55px; 
        margin-bottom: 10px; 
        display: block; 
      }
      #msg {
        font-size: 16px;
        line-height: 1.6;
        margin: 10px 0;
      }
      .btn-reset {
        margin-top: 15px; 
        background: white; 
        border: 1px solid #CCC; 
        padding: 8px 20px; 
        border-radius: 50px; 
        cursor: pointer; 
        color: #888;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🍹 電力特調</h1>
      
      <div class="guide-card">
        <h3>🧪 實驗小筆記</h3>
        <p>● 🔋 電池串聯 = 力量變強！</p>
        <p>● 🔋 電池並聯 = 體力變久！</p>
        <p>● 💡 燈泡串聯 = 大家分電變暗！</p>
        <p>● 💡 燈泡並聯 = 各自亮亮！</p>
      </div>

      <div class="select-box">
        <label>🔋 電池要怎麼接？</label>
        <select id="batterySelect">
          <option value="串聯">串聯「一條龍」</option>
          <option value="並聯">並聯「排排站」</option>
        </select>
      </div>

      <div class="select-box">
        <label>💡 燈泡要怎麼接？</label>
        <select id="bulbSelect">
          <option value="串聯">串聯「分著用」</option>
          <option value="並聯">並聯「自己用」</option>
        </select>
      </div>

      <button class="btn-mix" onclick="startMix()">開始特調！搖一搖！</button>

      <div id="result-display">
        <span class="emoji-icon" id="emoji"></span>
        <p id="msg"></p>
        <button class="btn-reset" onclick="resetGame()">重新嘗試</button>
      </div>
    </div>

    <script>
      // 將原本 Code.gs 的邏輯搬移到這裡
      function mixEnergyLogic(battery, bulb) {
        let result = "";
        let emoji = "";
        
        if (battery === "串聯" && bulb === "並聯") {
          result = "「超級閃亮特調！」愛迪生喝了一口，眼睛亮得像探照燈！他大喊：「喔喔喔！這電力強到可以看到外星人啦！」";
          emoji = "🤩⚡";
        } else if (battery === "並聯" && bulb === "串聯") {
          result = "「微弱螢火蟲特調...」愛迪生喝完打了個哈欠，額頭只有一點點紅光。他說：「助手，這電力太弱了，我連牙刷都動不了。」";
          emoji = "💤🪫";
        } else if (battery === "串聯" && bulb === "串聯") {
          result = "「普通亮度特調」愛迪生點了點頭。他說：「不錯喔，這是一杯四平八穩的果汁，雖然不刺激但很安全！」";
          emoji = "💡😊";
        } else if (battery === "並聯" && bulb === "並聯") {
          result = "「持久續航特調」愛迪生喝完後非常有精神，雖然燈泡沒特別亮，但他可以連續跳舞三天三夜不休息！";
          emoji = "🔋💃";
        } else {
          result = "「喔歐！短路啦！」杯子冒煙了！愛迪生的臉黑青一片。他咳嗽說：「咳咳... 雖然失敗了，但再來一次一定行！」";
          emoji = "💥😵";
        }
        return { text: result, icon: emoji };
      }

      function startMix() {
        const bat = document.getElementById('batterySelect').value;
        const bul = document.getElementById('bulbSelect').value;
        
        // 直接在前端執行判斷邏輯
        const res = mixEnergyLogic(bat, bul);
        showResult(res);
      }

      function showResult(res) {
        const box = document.getElementById('result-display');
        document.getElementById('emoji').innerText = res.icon;
        document.getElementById('msg').innerText = res.text;
        
        box.style.display = 'block';
        box.style.backgroundColor = res.icon.includes('💥') ? '#FFEBEE' : '#E8F5E9';
        
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      }

      function resetGame() {
        document.getElementById('result-display').style.display = 'none';
      }
    </script>
  </body>
</html>
